<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkflix</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
    <div class="navbar-left">
        <div class="logo-container">
            <a href="../index.html" style="text-decoration: none;">
                <h1 class="site-logo">DARKFLIX</h1>
            </a>
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="active">Início</a></li>
                <li><a href="#">Séries</a></li>
                <li><a href="#">Filmes</a></li>
                <li><a href="#">Jogos</a></li>
                <li><a href="#">Bombando</a></li>
                <li><a href="#">Minha lista</a></li>
            </ul>
        </nav>
    </div>
    <div class="navbar-right">
        <i class="fas fa-search icon"></i>
        <a href="../index.html" class="kids-link" style="text-decoration: none; color: inherit;">Carregando...</a>
        
        <div class="nav-notification">
            <i class="fas fa-bell icon"></i>
            <span class="notification-badge">42</span>
        </div>
        <a href="../index.html" class="profile-menu" title="Trocar Perfil">
            <img class="profile-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Profile">
            <i class="fas fa-caret-down icon"></i>
        </a>
    </div>
</header>

    <!-- Sliders Container -->
    <main class="sliders-container" id="main-content">
        <!-- Javascript will inject the rows here -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>DARKFLIX &copy; 2026 - Desenvolvido por Milena Torres durante a Imersão Front-End da Alura com IA</p>
            <ul class="footer-links">
                <li><a href="#">Perguntas frequentes</a></li>
                <li><a href="#">Centro de ajuda</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Entre em contato</a></li>
                <li><a href="#">Só no Darkflix</a></li>
            </ul>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
